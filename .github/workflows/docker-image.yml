name   名字: Build and Push Docker Image
# 触发条件：代码推送到 main 分支时自动运行
on   在:   :
  push   推:   推动:
    branches   分支：[主]   分支机构: [ main ]

jobs   工作:   工作:
  build   构建:   构建:
    runs-on   运行在: ubuntu-latest # 用GitHub云端的高配置机器构建，不占用你的服务器
    steps   步骤:   步骤:
      # 1. 拉取当前仓库的代码
      -    —name：签出代码name: Checkout code
        uses用途:行动/ checkout@v4: actions/checkout@v4

      # 2. 登录Docker Hub（用你之前配置的Secrets）
      - —name：登录Docker Hubname: Login to Docker Hub
        uses用途:码头工人/ login-action@v3: docker/login-action@v3
        with   ::
          username用户名：${{secrets。DOCKER_HUB_USERNAME}}: ${{ secrets.DOCKER_HUB_USERNAME }}
          password密码：${{secrets。DOCKER_HUB_TOKEN}}: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 3. 构建镜像并推送到Docker Hub
      - - name：构建和推送Docker镜像name: Build and push Docker image
        uses用途:码头工人/ build-push-action@v5: docker/build-push-action@v5
        with   ::
          context   背景:。: .
          push   推:真: true   真正的
          # 自动打标签：你的Docker Hub用户名/仓库名:latest，比如 xingwei02/user:latest
          tags标签：${{秘密。DOCKER_HUB_USERNAME}}/${{github.event.repository.name}}：最新: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ github.event.repository.name }}:latest
